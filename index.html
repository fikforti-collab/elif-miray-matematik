<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 Mırnav'ın Büyük Macerası - Elif Miray</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gri: #2D3436;
  --pembe: #FF9FF3;
  --pembe-koyu: #F368E0;
  --turuncu: #FECA57;
  --yesil: #1DD1A1;
  --lavanta: #A29BFE;
  --mavi: #54A0FF;
  --duman: #C8D6E5;
  --beyaz: #FFFFFF;
  --gölge: rgba(45, 52, 54, 0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Fredoka', sans-serif;
  background: 
    radial-gradient(circle at 20% 80%, var(--pembe) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, var(--lavanta) 0%, transparent 50%),
    linear-gradient(180deg, #DFE6E9 0%, #B2BEC3 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px;
  overflow: hidden;
}

/* TELEFON ÇERÇEVESİ */
.telefon {
  width: 100%;
  max-width: 380px;
  height: 100vh;
  max-height: 780px;
  background: var(--gri);
  border-radius: 45px;
  padding: 12px;
  box-shadow: 
    0 0 0 3px #1e1e1e,
    0 20px 60px rgba(0,0,0,0.4),
    inset 0 0 30px rgba(255,255,255,0.1);
  position: relative;
}

.ekran {
  width: 100%;
  height: 100%;
  background: linear-gradient(180deg, #74b9ff 0%, #a29bfe 50%, #fd79a8 100%);
  border-radius: 35px;
  overflow: hidden;
  position: relative;
}

/* ANASAYFA */
.anasayfa {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, #74b9ff 0%, #a29bfe 50%, #fd79a8 100%);
  z-index: 10;
  transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

.anasayfa.gizle {
  transform: scale(0);
  opacity: 0;
}

/* YÜZÜK GÖBEK */
.yuzuk {
  width: 200px;
  height: 200px;
  background: var(--beyaz);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 
    0 20px 0 #dfe6e9,
    0 25px 40px rgba(0,0,0,0.2);
  margin-bottom: 30px;
  animation: yuzukYüze 3s ease-in-out infinite;
}

@keyframes yuzukYüze {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

.kedi-anim {
  font-size: 8em;
  filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
}

/* BAŞLIK */
.baslik {
  text-align: center;
  margin-bottom: 40px;
}

.baslik h1 {
  color: var(--beyaz);
  font-size: 2.2em;
  text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
  margin-bottom: 10px;
  letter-spacing: 1px;
}

.baslik p {
  color: rgba(255,255,255,0.9);
  font-size: 1.1em;
}

/* BUTON */
.basla-btn {
  background: var(--turuncu);
  color: var(--gri);
  border: none;
  padding: 18px 60px;
  border-radius: 50px;
  font-family: 'Fredoka', sans-serif;
  font-size: 1.4em;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 
    0 8px 0 #e1b12c,
    0 15px 30px rgba(0,0,0,0.2);
  transition: all 0.1s;
}

.basla-btn:hover {
  transform: translateY(-3px);
  box-shadow: 
    0 11px 0 #e1b12c,
    0 20px 40px rgba(0,0,0,0.25);
}

.basla-btn:active {
  transform: translateY(4px);
  box-shadow: 
    0 4px 0 #e1b12c,
    0 8px 20px rgba(0,0,0,0.2);
}

/* OYUN ALANI */
.oyun-alani {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s;
}

.oyun-alani.aktif {
  opacity: 1;
  pointer-events: auto;
}

/* HEADER */
.oyun-header {
  background: rgba(255,255,255,0.95);
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.logo-mini {
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-mini span {
  font-size: 1.8em;
}

.logo-mini h2 {
  font-size: 1em;
  color: var(--gri);
}

/* İLERLEME */
.ilerleme {
  height: 10px;
  background: rgba(255,255,255,0.3);
}

.ilerleme-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--yesil), var(--turuncu));
  width: 7%;
  transition: width 0.5s;
  border-radius: 0 10px 10px 0;
}

/* SAHNE */
.sahne {
  flex: 1;
  position: relative;
  overflow: hidden;
}

/* BULUTLAR */
.bulut {
  position: absolute;
  background: var(--beyaz);
  border-radius: 50px;
  opacity: 0.9;
}

.bulut::before {
  content: '';
  position: absolute;
  background: inherit;
  border-radius: 50%;
}

.bulut-1 {
  width: 100px; height: 40px;
  top: 20px; left: -100px;
  animation: bulutGit 15s linear infinite;
}

.bulut-1::before {
  width: 50px; height: 50px;
  top: -25px; left: 20px;
}

.bulut-2 {
  width: 80px; height: 30px;
  top: 60px; left: -80px;
  animation: bulutGit 20s linear infinite;
  animation-delay: -5s;
}

.bulut-2::before {
  width: 35px; height: 35px;
  top: -18px; left: 15px;
}

@keyframes bulutGit {
  from { transform: translateX(0); }
  to { transform: translateX(450px); }
}

/* ZEMİN */
.zemin {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 70px;
}

/* TEPE */
.tepe {
  position: absolute;
  bottom: 60px;
  left: -20px;
  right: -20px;
  height: 40px;
  background: var(--yesil);
  border-radius: 50% 50% 0 0;
}

.dag {
  position: absolute;
  bottom: 80px;
  left: 10%;
  width: 60px;
  height: 50px;
  background: #2d3436;
  border-radius: 50% 50% 0 0;
}

.dag-2 {
  left: 70%;
  width: 80px;
  height: 60px;
}

/* EV */
.ev-b {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
}

.catı {
  width: 0;
  height: 0;
  border-left: 40px solid transparent;
  border-right: 40px solid transparent;
  border-bottom: 35px solid #e17055;
}

.govde {
  width: 70px;
  height: 50px;
  background: #fdcb6e;
  border-radius: 5px 5px 0 0;
}

/* KEDİ */
.kedi-sprite {
  position: absolute;
  bottom: 55px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 3.5em;
  transition: all 0.3s;
  filter: drop-shadow(0 8px 15px rgba(0,0,0,0.25));
  cursor: pointer;
  z-index: 5;
}

.kedi-sprite:hover {
  transform: translateX(-50%) scale(1.15);
}

.kedi-sprite.zıpla {
  animation: kediZıpla 0.5s ease-in-out infinite;
}

@keyframes kediZıpla {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-10px); }
}

/* PARTİKÜLLER */
.party {
  position: absolute;
  pointer-events: none;
  font-size: 2em;
  z-index: 20;
}

@keyframes partyDüş {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(300px) rotate(360deg); opacity: 0; }
}

/* SORU KUTUSU */
.soru-kutu {
  background: var(--beyaz);
  margin: 15px;
  border-radius: 25px;
  padding: 25px;
  text-align: center;
  box-shadow: 
    0 10px 0 #dfe6e9,
    0 15px 30px rgba(0,0,0,0.15);
  position: relative;
  overflow: hidden;
}

.soru-kutu::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: linear-gradient(90deg, var(--pembe), var(--mavi), var(--yesil), var(--turuncu));
}

.soru-tip {
  font-size: 0.8em;
  color: #636e72;
  font-weight: 600;
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.soru-metin {
  font-size: 2.5em;
  font-weight: 700;
  color: var(--gri);
}

/* YANIT */
.yanit-alani {
  padding: 0 15px 15px;
  display: flex;
  gap: 10px;
}

.yanit-input {
  flex: 1;
  font-family: 'Fredoka', sans-serif;
  font-size: 1.6em;
  font-weight: 600;
  padding: 15px;
  border: 4px solid var(--duman);
  border-radius: 20px;
  text-align: center;
  outline: none;
  background: var(--beyaz);
  color: var(--gri);
  transition: all 0.2s;
}

.yanit-input:focus {
  border-color: var(--mavi);
  box-shadow: 0 0 0 4px rgba(84, 160, 255, 0.2);
}

.yanit-btn {
  background: linear-gradient(180deg, var(--yesil), #10ac84);
  color: var(--beyaz);
  border: none;
  padding: 15px 25px;
  border-radius: 20px;
  font-family: 'Fredoka', sans-serif;
  font-size: 1.1em;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 5px 0 #189584, 0 8px 20px rgba(0,0,0,0.2);
  transition: all 0.1s;
}

.yanit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 7px 0 #189584, 0 12px 25px rgba(0,0,0,0.25);
}

.yanit-btn:active {
  transform: translateY(3px);
  box-shadow: 0 2px 0 #189584;
}

/* SONUÇ */
.sonuc {
  margin: 0 15px 15px;
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  display: none;
}

.sonuc.goster {
  display: block;
  animation: sonucGel 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

@keyframes sonucGel {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

.sonuc.dogru {
  background: linear-gradient(180deg, #55efc4, #00b894);
  color: var(--beyaz);
}

.sonuc.yanlis {
  background: linear-gradient(180deg, #ff7675, #d63031);
  color: var(--beyaz);
}

.sonuc-icon {
  font-size: 2.5em;
}

.sonuc-text {
  font-size: 1.3em;
  font-weight: 700;
  margin: 5px 0;
}

.sonuc-puan {
  font-size: 1.5em;
  font-weight: 700;
}

/* SEVİYE ATLAMA */
.seviye-atla {
  margin: 0 15px;
  background: linear-gradient(180deg, var(--turuncu), #f39c12);
  color: var(--gri);
  padding: 20px;
  border-radius: 20px;
  text-align: center;
  display: none;
}

.seviye-atla.goster {
  display: block;
  animation: seviyePırla 0.8s ease-in-out infinite alternate;
}

@keyframes seviyePırla {
  from { box-shadow: 0 0 20px var(--turuncu); }
  to { box-shadow: 0 0 40px var(--turuncu), 0 0 60px var(--pembe); }
}

.seviye-atla h3 {
  font-size: 1.3em;
  margin-bottom: 5px;
}

/* İPUCU */
.ipucu {
  text-align: center;
  padding: 10px;
  font-size: 0.85em;
  color: rgba(255,255,255,0.8);
  font-weight: 600;
}

/* BİTİŞ */
.bitis {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, #a29bfe 0%, #6c5ce7 50%, #2d3436 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: all 0.5s;
}

.bitis.aktif {
  opacity: 1;
  pointer-events: auto;
}

.bitis-madalyon {
  width: 120px;
  height: 120px;
  background: var(--turuncu);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 4em;
  box-shadow: 
    0 10px 0 #e1b12c,
    0 15px 40px rgba(0,0,0,0.3);
  margin-bottom: 30px;
  animation: madalyonBounce 1s ease-out;
}

@keyframes madalyonBounce {
  0% { transform: scale(0) rotate(-180deg); }
  60% { transform: scale(1.2) rotate(10deg); }
  100% { transform: scale(1) rotate(0deg); }
}

.bitis h2 {
  color: var(--beyaz);
  font-size: 1.8em;
  text-align: center;
  margin-bottom: 20px;
}

/* TABLO */
.tablo {
  background: var(--beyaz);
  border-radius: 20px;
  padding: 20px;
  width: 80%;
  margin-bottom: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.tablo-satır {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 2px dashed #dfe6e9;
}

.tablo-satır:last-child {
  border-bottom: none;
}

.tablo-etiket {
  color: #636e72;
  font-weight: 600;
}

.tablo-deger {
  color: var(--gri);
  font-weight: 700;
  font-size: 1.2em;
}

.tesekkur {
  background: var(--pembe);
  color: var(--gri);
  padding: 20px;
  border-radius: 20px;
  text-align: center;
  margin-bottom: 20px;
  width: 80%;
}

.tesekkur p {
  font-weight: 700;
  font-size: 1.1em;
}

.gizle { display: none !important; }
</style>
</head>
<body>

<div class="telefon">
  <div class="ekran">
    <!-- ANASAYFA -->
    <div class="anasayfa" id="anasayfa">
      <div class="yuzuk">
        <div class="kedi-anim">🐱</div>
      </div>
      <div class="baslik">
        <h1>Mırnav'ın<br>Maceraları</h1>
        <p>Her soru = Yeni bir oda!</p>
      </div>
      <button class="basla-btn" onclick="oyunuBaslat()">🎮 BAŞLA</button>
    </div>

    <!-- OYUN ALANI -->
    <div class="oyun-alani" id="oyunAlani">
      <div class="oyun-header">
        <div class="logo-mini">
          <span>🐱</span>
          <h2>Mırnav</h2>
        </div>
        <div>
          <span style="font-weight:700;color:var(--gri)">⭐ </span>
          <span id="puan" style="font-weight:700;color:var(--gri)">0</span>
        </div>
      </div>
      
      <div class="ilerleme">
        <div class="ilerleme-bar" id="ilerlemeBar"></div>
      </div>

      <div class="sahne">
        <div class="bulut bulut-1"></div>
        <div class="bulut bulut-2"></div>
        <div class="zemin">
          <div class="tepe"></div>
          <div class="dag dag-1"></div>
          <div class="dag dag-2"></div>
          <div class="ev-b">
            <div class="catı"></div>
            <div class="govde"></div>
          </div>
        </div>
        <div class="kedi-sprite" id="kedi">🐱</div>
      </div>

      <div class="soru-kutu">
        <div class="soru-tip" id="soruTip">TOPLAMA</div>
        <div class="soru-metin" id="soruMetin">5 + 3 = ?</div>
      </div>

      <div class="yanit-alani">
        <input type="number" class="yanit-input" id="yanitInput" placeholder="?" onkeydown="if(event.key==='Enter')gonder()">
        <button class="yanit-btn" onclick="gonder()">TAMAM</button>
      </div>

      <div class="sonuc" id="sonuc">
        <div class="sonuc-icon" id="sonucIcon">🎉</div>
        <div class="sonuc-text" id="sonucText">Aferin!</div>
        <div class="sonuc-puan" id="sonucPuan">+10</div>
      </div>

      <div class="seviye-atla" id="seviyeAtla">
        <h3>🚀 YENİ SEVİYE!</h3>
        <p id="seviyeMetin">Çarpma öğrendin!</p>
      </div>

      <div class="ipucu" id="ipucu">Seviye 1: Toplama</div>
    </div>

    <!-- BİTİŞ -->
    <div class="bitis" id="bitis">
      <div class="bitis-madalyon">🏆</div>
      <h2>Macera Bitti!</h2>
      
      <div class="tablo">
        <div class="tablo-satır">
          <span class="tablo-etiket">✅ Doğru</span>
          <span class="tablo-deger" id="bDogru">0</span>
        </div>
        <div class="tablo-satır">
          <span class="tablo-etiket">❌ Yanlış</span>
          <span class="tablo-deger" id="bYanlis">0</span>
        </div>
        <div class="tablo-satır">
          <span class="tablo-etiket">⭐ Puan</span>
          <span class="tablo-deger" id="bPuan">0</span>
        </div>
        <div class="tablo-satır">
          <span class="tablo-etiket">🚀 Seviye</span>
          <span class="tablo-deger" id="bSeviye">1</span>
        </div>
      </div>

      <div class="tesekkur">
        <p>🐱 Mırnav:<br>"Sen harikasın Elif Miray!<br>Bir sonraki macereya görüşürüz! 👋"</p>
      </div>

      <button class="basla-btn" onclick="tekrarOyna()">🔄 TEKRAR</button>
    </div>
  </div>
</div>

<script>
// Kediler ve efektleri
const KEDILER = ['🐱', '😺', '😻', '😽', '😼', '😸'];
const PARTİYKULER = ['💖', '⭐', '🌟', '✨', '💫'];

// Oyun
let oyun = { puan: 0, seviye: 1, oda: 1, dogru: 0, yanlis: 0, maxOda: 15, soru: null };

function oyunuBaslat() {
  oyun = { puan: 0, seviye: 1, oda: 1, dogru: 0, yanlis: 0, maxOda: 15, soru: null };
  document.getElementById('anasayfa').classList.add('gizle');
  document.getElementById('bitis').classList.remove('aktif');
  document.getElementById('oyunAlani').classList.add('aktif');
  guncelle();
  yeniSoru();
}

function guncelle() {
  document.getElementById('puan').textContent = oyun.puan;
  document.getElementById('ilerlemeBar').style.width = (oyun.oda / oyun.maxOda * 100) + '%';
}

function soruUret(s) {
  let islemler = s === 1 ? ['+'] : s === 2 ? ['+'] : s === 3 ? ['+', '-'] : s === 4 ? ['+', '-', '×'] : s === 5 ? ['×', '×'] : ['×', '÷', '×'];
  let op = islemler[Math.floor(Math.random() * islemler.length)];
  let a, b, cvp;
  
  if (op === '+') { a = rand(1, 10*s); b = rand(1, 10*s); cvp = a+b; }
  else if (op === '-') { a = rand(10, 20*s); b = rand(1, a); cvp = a-b; }
  else if (op === '×') { a = [2,3,5,10][rand(0,3)]; b = rand(1, 5); cvp = a*b; }
  else { b = rand(2, 8); cvp = rand(1, 8); a = b*cvp; }
  
  return {
    a, b, op, cvp,
    text: (op === '+' ? a+' + '+b : op === '-' ? a+' - '+b : op === '×' ? a+' × '+b : a+' ÷ '+b) + ' = ?',
    tip: op === '+' ? 'TOPLAMA' : op === '-' ? 'ÇIKARMA' : op === '×' ? 'ÇARPMA' : 'BÖLME'
  };
}

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function yeniSoru() {
  oyun.soru = soruUret(oyun.seviye);
  document.getElementById('soruTip').textContent = oyun.soru.tip;
  document.getElementById('soruMetin').textContent = oyun.soru.text;
  document.getElementById('yanitInput').value = '';
  document.getElementById('yanitInput').focus();
  document.getElementById('sonuc').className = 'sonuc gizle';
  document.getElementById('seviyeAtla').classList.remove('goster');
  
  // Kedi değiş
  document.getElementById('kedi').textContent = KEDILER[rand(0, KEDILER.length-1)];
  
  // İpucu
  let ipucu = oyun.seviye <= 2 ? 'Toplama (+)' : oyun.seviye === 3 ? 'Çıkarma var!' : oyun.seviye <= 5 ? 'Çarpma da geldi!' : 'Bölme de öğren!';
  document.getElementById('ipucu').textContent = 'Seviye ' + oyun.seviye + ': ' + ipucu;
}

function gonder() {
  let c = parseInt(document.getElementById('yanitInput').value);
  if (isNaN(c)) return;
  
  let dogrumu = c === oyun.soru.cvp;
  let sonuc = document.getElementById('sonuc');
  let kedi = document.getElementById('kedi');
  
  if (dogrumu) {
    oyun.dogru++;
    oyun.puan += 10 * oyun.seviye;
    
    sonuc.className = 'sonuc dogru goster';
    document.getElementById('sonucIcon').textContent = '🎉';
    document.getElementById('sonucText').textContent = 'Aferin!';
    document.getElementById('sonucPuan').textContent = '+' + (10*oyun.seviye);
    
    // Party!
    for(let i=0; i<5; i++) {
      setTimeout(() => partyEkle(), i * 100);
    }
    
    // Kedi zıplasın
    kedi.classList.add('zıpla');
    setTimeout(() => kedi.classList.remove('zıpla'), 500);
    
    // Seviye kontrol
    if (oyun.puan >= oyun.seviye * 80) {
      oyun.seviye++;
      let atla = document.getElementById('seviyeAtla');
      atla.classList.add('goster');
      let metin = oyun.seviye === 3 ? 'ÇIKARMA öğrendin!' : oyun.seviye === 4 ? 'ÇARPMA öğrendin!' : oyun.seviye === 6 ? 'BÖLME öğrendin!' : 'Yeni beceriler!';
      document.getElementById('seviyeMetin').textContent = metin;
    }
  } else {
    oyun.yanlis++;
    sonuc.className = 'sonuc yanlis goster';
    document.getElementById('sonucIcon').textContent = '😢';
    document.getElementById('sonucText').textContent = 'Doğru: ' + oyun.soru.cvp;
    document.getElementById('sonucPuan').textContent = '';
    kedi.textContent = '😿';
  }
  
  sonuc.style.display = 'block';
  guncelle();
  
  setTimeout(() => {
    if (oyun.oda < oyun.maxOda) {
      oyun.oda++;
      guncelle();
      yeniSoru();
    } else {
      oyunBitis();
    }
  }, 1500);
}

function partyEkle() {
  let p = document.createElement('div');
  p.className = 'party';
  p.textContent = PARTİYKULER[rand(0, PARTİYKULER.length-1)];
  p.style.left = (rand(20, 80)) + '%';
  p.style.top = (rand(30, 60)) + '%';
  p.style.animation = 'partyDüş 1s ease-out forwards';
  document.getElementById('oyunAlani').appendChild(p);
  setTimeout(() => p.remove(), 1000);
}

function oyunBitis() {
  document.getElementById('oyunAlani').classList.remove('aktif');
  document.getElementById('bitis').classList.add('aktif');
  document.getElementById('bDogru').textContent = oyun.dogru;
  document.getElementById('bYanlis').textContent = oyun.yanlis;
  document.getElementById('bPuan').textContent = oyun.puan;
  document.getElementById('bSeviye').textContent = oyun.seviye;
}

function tekrarOyna() {
  oyunuBaslat();
}
</script>
